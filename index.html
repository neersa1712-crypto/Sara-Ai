<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonChat - Anonymous & Secure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    
    <!-- Logo Section -->
    <div class="login-logo">
        <div class="logo-icon">🔒</div>
        <h1>AnonChat</h1>
        <p>Anonymous • Encrypted • Auto-Delete</p>
    </div>

    <!-- Login Box -->
    <div class="login-box">
        
        <!-- Username Input -->
        <div class="input-group">
            <label>👤 Username (koi bhi naam)</label>
            <input 
                type="text" 
                id="username" 
                placeholder="Example: Shadow99, Ghost, Tiger..."
                maxlength="20"
                autocomplete="off"
            />
            <small>Real naam mat dena ✓</small>
        </div>

        <!-- Room Code Input -->
        <div class="input-group">
            <label>🔢 Room Code (6 digit)</label>
            <input 
                type="tel" 
                id="roomCode" 
                placeholder="Example: 123456"
                maxlength="6"
                autocomplete="off"
            />
            <small>Dono logon ko same code dalna hoga ✓</small>
        </div>

        <!-- Error Message -->
        <div class="error-box" id="errorBox"></div>

        <!-- Buttons -->
        <button class="btn btn-create" onclick="createRoom()">
            🏠 Naya Room Banao
        </button>
        
        <div class="or-divider">
            <span>YA</span>
        </div>
        
        <button class="btn btn-join" onclick="joinRoom()">
            🚪 Room Join Karo
        </button>

    </div>

    <!-- Generated Room Code Display -->
    <div class="room-generated" id="roomGenerated">
        <p>📋 Tumhara Room Code:</p>
        <div class="big-code" id="bigCode">------</div>
        <p>Ye code apne dost ko bhejo</p>
        <button class="copy-btn" onclick="copyRoomCode()">
            📋 Code Copy Karo
        </button>
        <div class="countdown" id="countdown"></div>
    </div>

    <!-- Privacy Notice -->
    <div class="privacy-notice">
        <p>🛡️ Koi data save nahi hota</p>
        <p>🗑️ Messages auto-delete ho jate hain</p>
        <p>👤 Koi personal info nahi chahiye</p>
        <p>🔒 End-to-end encrypted</p>
    </div>

</div>

<script>
    // ====================================
    // ROOM CODE GENERATE KARNA
    // ====================================
    function generateRoomCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    let generatedCode = '';

    // ====================================
    // VALIDATION CHECK
    // ====================================
    function validateInputs(checkRoom = true) {
        const username = document.getElementById('username').value.trim();
        const roomCode = document.getElementById('roomCode').value.trim();

        // Username check
        if (!username) {
            showError('Username khali hai! Koi bhi naam dalo.');
            return false;
        }

        if (username.length < 2) {
            showError('Username kam se kam 2 letter ka hona chahiye!');
            return false;
        }

        // Special characters block
        const usernameRegex = /^[a-zA-Z0-9_]+$/;
        if (!usernameRegex.test(username)) {
            showError('Username mein sirf letters, numbers aur _ allowed hain!');
            return false;
        }

        // Room code check
        if (checkRoom) {
            if (!roomCode) {
                showError('Room code khali hai!');
                return false;
            }

            if (roomCode.length !== 6) {
                showError('Room code exactly 6 digit ka hona chahiye!');
                return false;
            }

            if (!/^\d{6}$/.test(roomCode)) {
                showError('Room code mein sirf numbers allowed hain!');
                return false;
            }
        }

        return true;
    }

    // ====================================
    // NAYA ROOM BANAO
    // ====================================
    function createRoom() {
        const username = document.getElementById('username').value.trim();

        if (!username) {
            showError('Pehle username dalo!');
            return;
        }

        if (username.length < 2) {
            showError('Username kam se kam 2 letters ka hona chahiye!');
            return;
        }

        // Generate room code
        generatedCode = generateRoomCode();
        
        // Room code input mein daal do
        document.getElementById('roomCode').value = generatedCode;
        
        // Generated code dikhao
        document.getElementById('bigCode').textContent = generatedCode;
        document.getElementById('roomGenerated').style.display = 'block';

        // Countdown - 5 seconds baad auto join
        let count = 5;
        document.getElementById('countdown').textContent = 
            count + ' second mein chat shuru hogi...';
        
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                document.getElementById('countdown').textContent = 
                    count + ' second mein chat shuru hogi...';
            } else {
                clearInterval(timer);
                enterChat(username, generatedCode);
            }
        }, 1000);
    }

    // ====================================
    // EXISTING ROOM JOIN KARO
    // ====================================
    function joinRoom() {
        if (!validateInputs(true)) return;

        const username = document.getElementById('username').value.trim();
        const roomCode = document.getElementById('roomCode').value.trim();

        enterChat(username, roomCode);
    }

    // ====================================
    // CHAT PAGE PE JAO
    // ====================================
    function enterChat(username, roomCode) {
        // Session storage mein save karo (tab close hone pe delete)
        sessionStorage.setItem('anon_username', username);
        sessionStorage.setItem('anon_roomcode', roomCode);
        sessionStorage.setItem('anon_jointime', Date.now());

        // Chat page pe redirect
        window.location.href = 'chat.html';
    }

    // ====================================
    // ROOM CODE COPY KARO
    // ====================================
    function copyRoomCode() {
        if (generatedCode) {
            navigator.clipboard.writeText(generatedCode).then(() => {
                alert('✅ Code copy ho gaya: ' + generatedCode + 
                      '\nApne dost ko bhejo!');
            }).catch(() => {
                prompt('Ye code copy karo:', generatedCode);
            });
        }
    }

    // ====================================
    // ERROR DIKHAO
    // ====================================
    function showError(message) {
        const errorBox = document.getElementById('errorBox');
        errorBox.textContent = '⚠️ ' + message;
        errorBox.style.display = 'block';
        
        setTimeout(() => {
            errorBox.style.display = 'none';
        }, 4000);
    }

    // ====================================
    // ROOM CODE LIMIT 6 DIGITS
    // ====================================
    document.getElementById('roomCode').addEventListener('input', function() {
        // Sirf numbers allow karo
        this.value = this.value.replace(/[^0-9]/g, '');
        
        // Max 6 digits
        if (this.value.length > 6) {
            this.value = this.value.slice(0, 6);
        }
    });

    // Enter press pe join
    document.getElementById('roomCode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') joinRoom();
    });

    document.getElementById('username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('roomCode').focus();
        }
    });
</script>

</body>
    </html>
