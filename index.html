<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Friend Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    background:#111;
    color:#fff;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:700;
    border-bottom:1px solid #222;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:16px;
}

.message{
    max-width:85%;
    padding:14px;
    margin:10px 0;
    border-radius:16px;
    word-wrap:break-word;
}

.user{
    margin-left:auto;
    background:#2563eb;
}

.ai{
    background:#222;
}

#status{
    text-align:center;
    padding:12px;
    color:#00ff88;
}

.controls{
    display:flex;
    justify-content:center;
    padding:20px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:16px 28px;
    font-size:18px;
    font-weight:700;
    background:#00ff88;
    color:#000;
}
</style>
</head>
<body>

<header>AI Friend Pro</header>

<div id="chat"></div>

<div id="status">Ready</div>

<div class="controls">
    <button id="talkBtn">🎤 Talk</button>
</div>

<script>
const GROQ_API_KEY = "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";

const chat = document.getElementById("chat");
const statusBox = document.getElementById("status");

let memory = JSON.parse(localStorage.getItem("ai_memory") || "[]");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function saveMemory(role, text) {
    memory.push({ role, text });

    if (memory.length > 30) {
        memory.shift();
    }

    localStorage.setItem(
        "ai_memory",
        JSON.stringify(memory)
    );
}

function getConversationContext() {
    return memory
        .slice(-10)
        .map(m => `${m.role}: ${m.text}`)
        .join("\n");
}

function getBestVoice() {
    const voices = speechSynthesis.getVoices();

    return (
        voices.find(v => v.name.includes("Google")) ||
        voices.find(v => v.lang.startsWith("en")) ||
        voices[0]
    );
}

function speak(text) {
    return new Promise(resolve => {

        speechSynthesis.cancel();

        const utterance =
            new SpeechSynthesisUtterance(text);

        utterance.voice = getBestVoice();
        utterance.rate = 0.95;
        utterance.pitch = 1.05;
        utterance.volume = 1;

        utterance.onend = resolve;

        speechSynthesis.speak(utterance);
    });
}

async function askGemini(userText) {

    const prompt = `
You are Nova, a friendly AI companion.

Rules:
- Reply naturally.
- Reply in Hindi if user speaks Hindi.
- Remember user information.
- Be warm and conversational.
- Keep replies short.

Conversation:
${getConversationContext()}

User:
${userText}
`;

    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [
                    {
                        parts: [
                            {
                                text: prompt
                            }
                        ]
                    }
                ]
            })
        }
    );

    const data = await response.json();

    console.log(data);

    if (!response.ok) {
        throw new Error(
            data?.error?.message || "API Error"
        );
    }

    return (
        data?.candidates?.[0]?.content?.parts?.[0]?.text ||
        "I couldn't generate a response."
    );
}

const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.lang = "en-US";
recognition.interimResults = false;
recognition.continuous = false;

recognition.onstart = () => {
    statusBox.textContent = "Listening...";
};

recognition.onend = () => {
    statusBox.textContent = "Ready";
};

recognition.onerror = e => {
    console.error(e);
};

recognition.onresult = async e => {

    const userText =
        e.results[0][0].transcript;

    addMessage(userText, "user");
    saveMemory("user", userText);

    statusBox.textContent = "Thinking...";

    try {

        const reply =
            await askGemini(userText);

        addMessage(reply, "ai");
        saveMemory("ai", reply);

        statusBox.textContent = "Speaking...";

        await speak(reply);

        statusBox.textContent = "Ready";

        setTimeout(() => {
            try {
                recognition.start();
            } catch {}
        }, 1000);

    } catch (error) {

        console.error(error);

        addMessage(
            "Connection error. Check API key.",
            "ai"
        );

        statusBox.textContent = "Error";
    }
};

document
.getElementById("talkBtn")
.addEventListener("click", () => {
    recognition.start();
});
</script>

</body>
</html>
