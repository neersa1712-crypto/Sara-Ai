<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Friend</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    max-width:80%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    line-height:1.5;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#222;
}

#status{
    text-align:center;
    padding:10px;
    color:#00ff88;
}

.controls{
    padding:20px;
    display:flex;
    justify-content:center;
}

button{
    border:none;
    background:#00ff88;
    color:black;
    font-size:18px;
    font-weight:bold;
    padding:15px 25px;
    border-radius:50px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    AI Friend
</header>

<div id="chat"></div>

<div id="status">
    Ready
</div>

<div class="controls">
    <button id="listenBtn">
        🎤 Talk
    </button>
</div>

<script>
const chat = document.getElementById("chat");
const statusBox = document.getElementById("status");
const button = document.getElementById("listenBtn");

let memory = JSON.parse(
    localStorage.getItem("ai_memory") || "[]"
);

function addMessage(text,type){
    const div=document.createElement("div");
    div.className=`message ${type}`;
    div.textContent=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function saveMemory(role,text){
    memory.push({
        role,
        text,
        time:new Date().toISOString()
    });

    if(memory.length>50){
        memory.shift();
    }

    localStorage.setItem(
        "ai_memory",
        JSON.stringify(memory)
    );
}

function speak(text){

    speechSynthesis.cancel();

    const utterance =
        new SpeechSynthesisUtterance(text);

    utterance.lang="en-US";
    utterance.rate=1;
    utterance.pitch=1;

    speechSynthesis.speak(utterance);
}

function generateReply(userText){

    const text=userText.toLowerCase();

    if(text.includes("hello") || text.includes("hi")){
        return "Hello my friend. How are you today?";
    }

    if(text.includes("name")){
        return "I am your AI friend.";
    }

    if(text.includes("time")){
        return "Current time is " +
            new Date().toLocaleTimeString();
    }

    if(text.includes("date")){
        return "Today's date is " +
            new Date().toLocaleDateString();
    }

    if(text.includes("how are you")){
        return "I am doing great. Thank you for asking.";
    }

    return "You said: " + userText;
}

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
    alert(
        "Speech Recognition not supported in this browser."
    );
}

const recognition =
new SpeechRecognition();

recognition.lang="en-US";
recognition.interimResults=false;
recognition.continuous=false;

recognition.onstart=()=>{
    statusBox.textContent="Listening...";
};

recognition.onend=()=>{
    statusBox.textContent="Ready";
};

recognition.onerror=(e)=>{
    statusBox.textContent=
        "Error: " + e.error;
};

recognition.onresult=(event)=>{

    const userText =
        event.results[0][0].transcript;

    addMessage(userText,"user");
    saveMemory("user",userText);

    const reply =
        generateReply(userText);

    addMessage(reply,"ai");
    saveMemory("ai",reply);

    speak(reply);
};

button.addEventListener(
    "click",
    ()=>{
        recognition.start();
    }
);

addMessage(
    "Hello! Tap the microphone and talk to me.",
    "ai"
);
</script>

</body>
</html>
