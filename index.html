<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Friend Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    background:#111;
    color:#fff;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:700;
    border-bottom:1px solid #222;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:16px;
}

.message{
    max-width:85%;
    padding:14px;
    margin:10px 0;
    border-radius:16px;
    word-wrap:break-word;
}

.user{
    margin-left:auto;
    background:#2563eb;
}

.ai{
    background:#222;
}

#status{
    text-align:center;
    padding:12px;
    color:#00ff88;
}

.controls{
    display:flex;
    justify-content:center;
    padding:20px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:16px 28px;
    font-size:18px;
    font-weight:700;
    background:#00ff88;
    color:#000;
}
</style>
</head>
<body>

<header>AI Friend Pro</header>

<div id="chat"></div>

<div id="status">Ready</div>

<div class="controls">
    <button id="talkBtn">🎤 Talk</button>
</div>

<script>
const GEMINI_API_KEY = "AQ.Ab8RN6LntV3xOqxMBWf1vta2983okEuL_6zPCSjMeYaiWtfDIg";

const chat = document.getElementById("chat");
const statusBox = document.getElementById("status");
const talkBtn = document.getElementById("talkBtn");

let autoMode = true;

let memory = JSON.parse(
    localStorage.getItem("ai_memory") || "[]"
);

function addMessage(text,type){
    const div=document.createElement("div");
    div.className=`message ${type}`;
    div.textContent=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function saveMemory(role,text){
    memory.push({
        role,
        text,
        time:Date.now()
    });

    if(memory.length>40){
        memory.shift();
    }

    localStorage.setItem(
        "ai_memory",
        JSON.stringify(memory)
    );
}

function getConversationContext(){
    return memory
        .slice(-12)
        .map(m=>`${m.role}: ${m.text}`)
        .join("\n");
}

function getBestVoice(){
    const voices = speechSynthesis.getVoices();

    return (
        voices.find(v => v.name.includes("Google")) ||
        voices.find(v => v.lang.startsWith("en")) ||
        voices[0]
    );
}

function speak(text){

    return new Promise(resolve=>{

        speechSynthesis.cancel();

        const utterance =
            new SpeechSynthesisUtterance(text);

        utterance.voice = getBestVoice();
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;

        utterance.onend = ()=>{
            resolve();
        };

        speechSynthesis.speak(utterance);
    });
}

async function askGemini(userText){

    const prompt = `
You are a friendly AI companion.

Previous conversation:
${getConversationContext()}

User:
${userText}
`;

    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                contents:[
                    {
                        parts:[
                            {
                                text:prompt
                            }
                        ]
                    }
                ]
            })
        }
    );

    const data = await response.json();

    return data.candidates?.[0]?.content?.parts?.[0]?.text
        || "Sorry, I couldn't respond.";
}

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
    alert("Speech Recognition not supported.");
}

const recognition = new SpeechRecognition();

recognition.lang = "en-US";
recognition.interimResults = false;
recognition.continuous = false;

recognition.onstart = ()=>{
    statusBox.textContent = "Listening...";
};

recognition.onerror = ()=>{
    statusBox.textContent = "Error";
};

recognition.onend = ()=>{
    statusBox.textContent = "Ready";
};

recognition.onresult = async(event)=>{

    const userText =
        event.results[0][0].transcript;

    addMessage(userText,"user");
    saveMemory("user",userText);

    statusBox.textContent = "Thinking...";

    try{

        const reply =
            await askGemini(userText);

        addMessage(reply,"ai");
        saveMemory("ai",reply);

        statusBox.textContent = "Speaking...";

        await speak(reply);

        statusBox.textContent = "Ready";

        if(autoMode){
            setTimeout(()=>{
                recognition.start();
            },700);
        }

    }catch(error){

        console.error(error);

        const msg =
            "Sorry, there was an error connecting to AI.";

        addMessage(msg,"ai");

        await speak(msg);

        statusBox.textContent = "Ready";
    }
};

talkBtn.addEventListener("click",()=>{

    speechSynthesis.cancel();

    recognition.start();
});

speechSynthesis.onvoiceschanged = ()=>{
    speechSynthesis.getVoices();
};

addMessage(
    "Hello. Tap the microphone and start talking.",
    "ai"
);
</script>

</body>
</html>
