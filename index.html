<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara - Real Voice Assistant</title>
    <style>
        body {
            margin: 0;
            background-color: #050505; /* Battery saving pure black */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Abstract UI: Glowing Orb */
        #ai-orb {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #222;
            box-shadow: 0 0 20px #111;
            transition: all 0.5s ease;
            margin-bottom: 30px;
        }

        .sleeping { background: #333; box-shadow: 0 0 10px #222; opacity: 0.5; }
        .listening { background: #3b82f6; box-shadow: 0 0 50px #3b82f6; animation: pulse 1.5s infinite alternate; }
        .thinking { background: #d946ef; box-shadow: 0 0 50px #d946ef; animation: pulse 0.5s infinite alternate; }
        .speaking { background: #10b981; box-shadow: 0 0 60px #10b981; animation: pulse 0.8s infinite alternate; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        #status { color: #888; font-size: 1.2rem; margin-bottom: 10px; text-align: center;}
        #response { color: #e2e8f0; font-size: 1.1rem; max-width: 80%; text-align: center; min-height: 50px; line-height: 1.6; }

        /* Top Navigation Bar */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }
        .nav-btn:active { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="top-bar">
        <button class="nav-btn" onclick="goBack()">❮ Back</button>
        <button class="nav-btn" onclick="exitApp()">✕ Close</button>
    </div>
    
    <div id="ai-orb" class="sleeping"></div>
    <div id="status">Tap screen to Start & Unlock Audio...</div>
    <div id="response"></div>

    <script>
        // --- 1. APNI API KEY YAHAN DALEIN ---
        const GEMINI_API_KEY = "AQ.Ab8RN6I9MRjXyyoKUx62aXnj6eAWrs7M4cWtvPG7Rfu8RyDEaQ"; 

        const statusText = document.getElementById('status');
        const responseText = document.getElementById('response');
        const orb = document.getElementById('ai-orb');
        
        let isAwake = false;
        let isSpeaking = false;
        let recognition;
        let bestFemaleVoice = null;
        let ttsUnlocked = false; // Audio lock bypass ke liye flag

        // Browser ki aawaz load karna (Best Female Hindi Voice)
        function loadBestVoice() {
            let voices = window.speechSynthesis.getVoices();
            bestFemaleVoice = voices.find(v => v.lang === 'hi-IN' && v.name.includes('female')) || 
                              voices.find(v => v.name.includes('Google हिन्दी')) ||
                              voices.find(v => v.lang === 'hi-IN') || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = loadBestVoice;

        async function keepScreenOn() {
            try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } 
            catch (err) { console.log(err); }
        }

        function setOrbState(state) {
            orb.className = '';
            orb.classList.add(state);
        }

        function goBack() { window.history.back(); }
        function exitApp() {
            if (document.fullscreenElement) document.exitFullscreen();
            else window.history.back();
        }

        // --- THE MAGIC CLICK: Screen Touch Setup ---
        document.body.addEventListener('click', function() {
            // Fullscreen karna
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>e);
            
            // Screen on rakhna
            keepScreenOn();
            if(!bestFemaleVoice) loadBestVoice();
            
            // Audio Lock kholna (Khali aawaz chala kar)
            if(!ttsUnlocked) {
                let unlockAudio = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(unlockAudio);
                ttsUnlocked = true;
            }

            // Mic chalu karna
            if (!recognition) initVoiceSystem();
        });

        function initVoiceSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return statusText.innerText = "Please use Chrome Browser.";
            
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.lang = 'hi-IN'; // Hindi + English

            recognition.onstart = () => {
                if(!isAwake) { 
                    statusText.innerText = "Sleeping... Say 'Sara' ya 'Hello'"; 
                    setOrbState('sleeping'); 
                } 
                else if(!isSpeaking) { 
                    statusText.innerText = "Listening..."; 
                    setOrbState('listening'); 
                }
            };

            recognition.onresult = async function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase().trim();
                console.log("Mic Heard:", transcript); // Check ke liye console log
                
                if (!isAwake) {
                    // Check Hindi 'सारा', English 'sara' and 'hello'
                    if (transcript.includes("sara") || transcript.includes("सारा") || transcript.includes("wake up") || transcript.includes("hello")) {
                        isAwake = true;
                        speak("Hmm... Haan ji bataiye?"); 
                    }
                } else {
                    if (transcript.includes("bye") || transcript.includes("stop") || transcript.includes("so jao") || transcript.includes("बाय")) {
                        isAwake = false;
                        window.speechSynthesis.cancel();
                        speak("Theek hai. Main jaa rahi hu.");
                        return;
                    }
                    
                    statusText.innerText = "Thinking...";
                    setOrbState('thinking');
                    
                    // Artificial human thinking sound
                    speak("Hmm...", true); 
                    await callGeminiAI(transcript);
                }
            };

            recognition.onerror = (e) => { 
                if(e.error === 'not-allowed') statusText.innerText = "Mic Permission Denied! Allow it from site settings.";
            };
            
            recognition.onend = () => { 
                // Sirf tab dubara chalu karo jab AI bol na rahi ho
                if(!isSpeaking) { try { recognition.start(); } catch(e) {} }
            };

            try { recognition.start(); } catch(e) {}
        }

        async function callGeminiAI(prompt) {
            try {
                // Secret Prompt to make AI sound like a real girl
                const humanPrompt = prompt + " (Instruction: Reply like a casual human girl. Use filler words like 'Acha', 'Dekho'. Add pauses using commas. Keep it strictly under 2 short sentences in Hinglish. No emojis.)";

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: humanPrompt }] }] })
                });
                const data = await res.json();
                const textReply = data.candidates[0].content.parts[0].text;
                
                responseText.innerText = textReply;
                speak(textReply, false);
            } catch (e) {
                statusText.innerText = "Network Error...";
                if(!isSpeaking) { try{ recognition.start(); }catch(e){} }
            }
        }

        function speak(text, isFiller = false) {
            isSpeaking = true;
            if(recognition) recognition.stop(); // Stop listening while AI is talking

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.pitch = 1.2; // Slightly high pitch for soft voice
            utterance.rate = 0.95; // Slightly slower for natural pacing
            if(bestFemaleVoice) utterance.voice = bestFemaleVoice;

            utterance.onstart = () => {
                if(!isFiller) {
                    statusText.innerText = "Sara is speaking...";
                    setOrbState('speaking');
                }
            };

            utterance.onend = () => {
                if(isFiller) return; // If it was just "Hmm", do not restart mic yet

                isSpeaking = false;
                if(isAwake) {
                    statusText.innerText = "Listening...";
                    setOrbState('listening');
                } else {
                    statusText.innerText = "Sleeping... Say 'Sara'";
                    setOrbState('sleeping');
                    responseText.innerText = "";
                }
                
                if(recognition) { try { recognition.start(); } catch(e) {} }
            };

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
        </html>
